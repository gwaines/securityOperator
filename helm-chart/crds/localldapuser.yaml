apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: localldapusers.starlingx.io
spec:
  group: starlingx.io
  versions:
  - name: v1
    served: true
    storage: true
    additionalPrinterColumns:
    - name: Mail
      type: string
      jsonPath: .spec.mail[0]
    - name: UID
      type: integer
      jsonPath: .status.uidNumber
    - name: Home
      type: string
      jsonPath: .spec.homeDirectory
    - name: Shell
      type: string
      jsonPath: .spec.loginShell
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - uid
            properties:
              uid:
                type: string
                description: "User identifier"
              cn:
                type: string
                description: "Common name"
              sn:
                type: string
                description: "Surname"
              givenName:
                type: string
                description: "Given name"
              displayName:
                type: string
                description: "Display name"
              mail:
                type: array
                items:
                  type: string
                description: "Email addresses"
              userPasswordSecret:
                type: object
                properties:
                  name:
                    type: string
                  key:
                    type: string
                description: "Secret containing user password"
              pwdReset:
                type: boolean
                default: true
                description: "Force password reset on first login"
              passwordPolicyRef:
                type: object
                properties:
                  name:
                    type: string
                description: "Reference to password policy"
              homeDirectory:
                type: string
                description: "User home directory"
              loginShell:
                type: string
                default: "/bin/bash"
                description: "User login shell"
          status:
            type: object
            properties:
              uidNumber:
                type: integer
                description: "Assigned UID number"
              gidNumber:
                type: integer
                description: "Primary GID number"
              temporaryLockOut:
                type: boolean
                description: "Temporary lockout status"
    subresources:
      status: {}
  scope: Namespaced
  names:
    plural: localldapusers
    singular: localldapuser
    kind: LocalLdapUser