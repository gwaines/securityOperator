apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: linuxrolebindings.starlingx.io
spec:
  group: starlingx.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              description:
                type: string
                description: "Description of the role binding"
              subjects:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: string
                    description: "List of users"
                  groups:
                    type: array
                    items:
                      type: string
                    description: "List of groups"
                description: "Subjects for the role binding"
              role:
                type: object
                properties:
                  linuxGroups:
                    type: array
                    items:
                      type: string
                    description: "List of Linux groups"
                description: "Role definition"
          status:
            type: object
  scope: Namespaced
  names:
    plural: linuxrolebindings
    singular: linuxrolebinding
    kind: LinuxRoleBinding