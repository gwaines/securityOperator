apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: localldappasswordpolicies.starlingx.io
spec:
  group: starlingx.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              pwdMinLength:
                type: integer
                default: 12
                description: "Minimum password length"
              pwdMaxAge:
                type: integer
                default: 7776000
                description: "Maximum password age in seconds"
              pwdInHistory:
                type: integer
                default: 5
                description: "Number of passwords to remember"
              pwdLockout:
                type: boolean
                default: true
                description: "Enable account lockout"
              pwdMaxFailure:
                type: integer
                default: 3
                description: "Maximum failed attempts before lockout"
              pwdLockoutDuration:
                type: integer
                default: 300
                description: "Lockout duration in seconds"
              pwdCheckQuality:
                type: integer
                default: 2
                description: "Password quality check level"
              pwdExpireWarning:
                type: integer
                default: 604800
                description: "Password expiry warning time in seconds"
              pwdGraceAuthnLimit:
                type: integer
                default: 2
                description: "Grace authentication limit"
          status:
            type: object
  scope: Namespaced
  names:
    plural: localldappasswordpolicies
    singular: localldappasswordpolicy
    kind: LocalLdapPasswordPolicy